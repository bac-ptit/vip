openapi: 3.0.3
info:
  title: VIP Backend API
  description: High-performance backend for VIP project using Drogon and Glaze. Logic auth được quản lý trực tiếp tại từng Controller.
  version: 1.0.0
servers:
  - url: /api/v1
    description: Primary API version

components:
  securitySchemes:
    AdminAuth:
      type: apiKey
      in: header
      name: X-Admin-Id
      description: Custom header for admin authentication.
    CookieAuth:
      type: apiKey
      in: cookie
      name: JSESSIONID

  schemas:
    # Common
    ErrorResponse:
      type: object
      properties:
        error:
          type: string

    # Auth
    RegisterAdminRequest:
      type: object
      required: [username, password, full_name]
      properties:
        username: { type: string }
        password: { type: string }
        full_name: { type: string }
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }
    AdminResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        full_name: { type: string }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # Admin
    UpdateProfileRequest:
      type: object
      properties:
        username: { type: string }
        full_name: { type: string }
    ChangePasswordRequest:
      type: object
      required: [old_password, new_password]
      properties:
        old_password: { type: string }
        new_password: { type: string }

    # Products
    CreateProductRequest:
      type: object
      required: [type, name, price]
      properties:
        type: { type: string }
        name: { type: string }
        price: { type: string }
        area: { type: string }
        description: { type: string }
        is_active: { type: boolean }
    UpdateProductRequest:
      type: object
      properties:
        type: { type: string }
        name: { type: string }
        price: { type: string }
        area: { type: string }
        description: { type: string }
        is_active: { type: boolean }
    ProductResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        type: { type: string }
        name: { type: string }
        price: { type: string }
        area: { type: string }
        description: { type: string }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # Product Images
    CreateProductImageRequest:
      type: object
      required: [product_id, url]
      properties:
        product_id: { type: string, format: uuid }
        url: { type: string }
        is_cover: { type: boolean }
        sort_order: { type: integer }
    UpdateProductImageRequest:
      type: object
      properties:
        product_id: { type: string, format: uuid }
        url: { type: string }
        is_cover: { type: boolean }
        sort_order: { type: integer }
    ProductImageResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        product_id: { type: string, format: uuid }
        url: { type: string }
        is_cover: { type: boolean }
        sort_order: { type: integer }
        uploaded_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }

    # Floor Plans
    CreateFloorPlanRequest:
      type: object
      required: [title, url]
      properties:
        title: { type: string }
        url: { type: string }
        sort_order: { type: integer }
        is_active: { type: boolean }
    UpdateFloorPlanRequest:
      type: object
      properties:
        title: { type: string }
        url: { type: string }
        sort_order: { type: integer }
        is_active: { type: boolean }
    FloorPlanResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        url: { type: string }
        sort_order: { type: integer }
        is_active: { type: boolean }
        uploaded_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }

    # Media
    CreateMediaRequest:
      type: object
      required: [type, url]
      properties:
        type: { type: string }
        title: { type: string }
        url: { type: string }
        thumbnail: { type: string }
        sort_order: { type: integer }
        is_active: { type: boolean }
    UpdateMediaRequest:
      type: object
      properties:
        type: { type: string }
        title: { type: string }
        url: { type: string }
        thumbnail: { type: string }
        sort_order: { type: integer }
        is_active: { type: boolean }
    MediaResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        type: { type: string }
        title: { type: string }
        url: { type: string }
        thumbnail: { type: string }
        sort_order: { type: integer }
        is_active: { type: boolean }
        uploaded_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }

    # Registrations
    CreateRegistrationRequest:
      type: object
      required: [full_name, phone]
      properties:
        full_name: { type: string }
        phone: { type: string }
        email: { type: string }
        address: { type: string }
        note: { type: string }
        interests: { type: array, items: { type: string } }
    UpdateRegistrationRequest:
      type: object
      properties:
        is_contacted: { type: boolean }
        note: { type: string }
    RegistrationResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        full_name: { type: string }
        phone: { type: string }
        email: { type: string }
        address: { type: string }
        note: { type: string }
        is_contacted: { type: boolean }
        contacted_by: { type: string, format: uuid }
        contacted_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        interests: { type: array, items: { type: string } }

    # Project Info
    CreateProjectInfoRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        developer: { type: string }
        scale: { type: string }
        description: { type: string }
        map_lat: { type: number }
        map_lng: { type: number }
        map_zoom: { type: integer }
    UpdateProjectInfoRequest:
      type: object
      properties:
        name: { type: string }
        developer: { type: string }
        scale: { type: string }
        description: { type: string }
        map_lat: { type: number }
        map_lng: { type: number }
        map_zoom: { type: integer }
    ProjectInfoResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        developer: { type: string }
        scale: { type: string }
        description: { type: string }
        map_lat: { type: number }
        map_lng: { type: number }
        map_zoom: { type: integer }
        updated_by: { type: string, format: uuid }
        updated_at: { type: string, format: date-time }

    # Site Settings
    UpdateSiteSettingsRequest:
      type: object
      properties:
        hotline: { type: string }
        email: { type: string }
        address: { type: string }
        zalo_link: { type: string }
        facebook_link: { type: string }
        logo_url: { type: string }
        tagline: { type: string }
    SiteSettingsResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        hotline: { type: string }
        email: { type: string }
        address: { type: string }
        zalo_link: { type: string }
        facebook_link: { type: string }
        logo_url: { type: string }
        tagline: { type: string }
        updated_by: { type: string, format: uuid }
        updated_at: { type: string, format: date-time }

    # Activity Logs
    ActivityLogResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        admin_id: { type: string, format: uuid }
        action: { type: string }
        entity: { type: string }
        entity_id: { type: string, format: uuid }
        detail: { type: string }
        ip_address: { type: string }
        created_at: { type: string, format: date-time }

    # Admin Sessions
    AdminSessionResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        admin_id: { type: string, format: uuid }
        refresh_token: { type: string }
        ip_address: { type: string }
        user_agent: { type: string }
        expires_at: { type: string, format: date-time }
        revoked: { type: boolean }
        created_at: { type: string, format: date-time }

paths:
  # Auth
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new admin (Public)
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/RegisterAdminRequest' } } }
      responses:
        200: { description: Success, content: { application/json: { schema: { $ref: '#/components/schemas/AdminResponse' } } } }

  /auth/login:
    post:
      tags: [Auth]
      summary: Login as admin (Public)
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/LoginRequest' } } }
      responses:
        200: { description: Success, content: { application/json: { schema: { $ref: '#/components/schemas/AdminResponse' } } } }
        401: { description: Unauthorized }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout current session (Auth)
      security: [{ AdminAuth: [] }, { CookieAuth: [] }]
      responses:
        200: { description: Success }

  # Admin
  /admin:
    get:
      tags: [Admin]
      summary: Get all admins (Auth)
      security: [{ AdminAuth: [] }]
      responses:
        200: { description: Success, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/AdminResponse' } } } } }

  /admin/{id}:
    get:
      tags: [Admin]
      summary: Get admin by ID (Auth)
      security: [{ AdminAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        200: { description: Success, content: { application/json: { schema: { $ref: '#/components/schemas/AdminResponse' } } } }
        404: { description: Not Found }

  /admin/username/{username}:
    get:
      tags: [Admin]
      summary: Get admin by username (Auth)
      security: [{ AdminAuth: [] }]
      parameters: [{ name: username, in: path, required: true, schema: { type: string } }]
      responses:
        200: { description: Success, content: { application/json: { schema: { $ref: '#/components/schemas/AdminResponse' } } } }

  /admin/active:
    get:
      tags: [Admin]
      summary: Get all active admins (Auth)
      security: [{ AdminAuth: [] }]
      responses:
        200: { description: Success, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/AdminResponse' } } } } }

  /admin/{id}/profile:
    put:
      tags: [Admin]
      summary: Update admin profile (Auth)
      security: [{ AdminAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/UpdateProfileRequest' } } }
      responses:
        200: { description: Success }

  /admin/{id}/password:
    put:
      tags: [Admin]
      summary: Change admin password (Auth)
      security: [{ AdminAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/ChangePasswordRequest' } } }
      responses:
        200: { description: Success }

  /admin/{id}/deactivate:
    post:
      tags: [Admin]
      summary: Deactivate admin (Auth)
      security: [{ AdminAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        200: { description: Success }

  /admin/{id}/activate:
    post:
      tags: [Admin]
      summary: Activate admin (Auth)
      security: [{ AdminAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        200: { description: Success }

  /admin/check-username/{username}:
    get:
      tags: [Admin]
      summary: Check if username is available (Auth)
      security: [{ AdminAuth: [] }]
      parameters: [{ name: username, in: path, required: true, schema: { type: string } }]
      responses:
        200: { description: Success, content: { application/json: { schema: { type: object, properties: { available: { type: boolean } } } } } }

  # Products
  /products:
    get:
      tags: [Product]
      summary: Get all products (Public)
      responses:
        200: { description: Success, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/ProductResponse' } } } } }
    post:
      tags: [Product]
      summary: Create new product (Auth)
      security: [{ AdminAuth: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreateProductRequest' } } }
      responses:
        200: { description: Success, content: { application/json: { schema: { $ref: '#/components/schemas/ProductResponse' } } } }

  /products/{id}:
    get:
      tags: [Product]
      summary: Get product by ID (Public)
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        200: { description: Success, content: { application/json: { schema: { $ref: '#/components/schemas/ProductResponse' } } } }
    put:
      tags: [Product]
      summary: Update product (Auth)
      security: [{ AdminAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/UpdateProductRequest' } } }
      responses:
        200: { description: Success }
    delete:
      tags: [Product]
      summary: Delete product (Auth)
      security: [{ AdminAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        200: { description: Success }

  /products/search:
    get:
      tags: [Product]
      summary: Search products (Public)
      parameters:
        - { name: name, in: query, schema: { type: string } }
        - { name: type, in: query, schema: { type: string } }
        - { name: min_price, in: query, schema: { type: string } }
        - { name: max_price, in: query, schema: { type: string } }
      responses:
        200: { description: Success, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/ProductResponse' } } } } }

  # Product Images
  /productimages:
    post:
      tags: [ProductImage]
      summary: Create product image (Auth)
      security: [{ AdminAuth: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreateProductImageRequest' } } }
      responses:
        200: { description: Success, content: { application/json: { schema: { $ref: '#/components/schemas/ProductImageResponse' } } } }

  /productimages/{id}:
    get:
      tags: [ProductImage]
      summary: Get product image by ID (Public)
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        200: { description: Success, content: { application/json: { schema: { $ref: '#/components/schemas/ProductImageResponse' } } } }
    put:
      tags: [ProductImage]
      summary: Update product image (Auth)
      security: [{ AdminAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/UpdateProductImageRequest' } } }
      responses:
        200: { description: Success }
    delete:
      tags: [ProductImage]
      summary: Delete product image (Auth)
      security: [{ AdminAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        200: { description: Success }

  /productimages/product/{product_id}:
    get:
      tags: [ProductImage]
      summary: Get all images for a product (Public)
      parameters: [{ name: product_id, in: path, required: true, schema: { type: string } }]
      responses:
        200: { description: Success, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/ProductImageResponse' } } } } }

  /productimages/product/{product_id}/active:
    get:
      tags: [ProductImage]
      summary: Get active images for a product (Public)
      parameters: [{ name: product_id, in: path, required: true, schema: { type: string } }]
      responses:
        200: { description: Success, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/ProductImageResponse' } } } } }

  # Floor Plans
  /floorplans:
    get:
      tags: [FloorPlan]
      summary: Get all floor plans (Public)
      responses:
        200: { description: Success, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/FloorPlanResponse' } } } } }
    post:
      tags: [FloorPlan]
      summary: Create floor plan (Auth)
      security: [{ AdminAuth: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreateFloorPlanRequest' } } }
      responses:
        200: { description: Success, content: { application/json: { schema: { $ref: '#/components/schemas/FloorPlanResponse' } } } }

  /floorplans/{id}:
    get:
      tags: [FloorPlan]
      summary: Get floor plan by ID (Public)
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        200: { description: Success, content: { application/json: { schema: { $ref: '#/components/schemas/FloorPlanResponse' } } } }
    put:
      tags: [FloorPlan]
      summary: Update floor plan (Auth)
      security: [{ AdminAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/UpdateFloorPlanRequest' } } }
      responses:
        200: { description: Success }
    delete:
      tags: [FloorPlan]
      summary: Delete floor plan (Auth)
      security: [{ AdminAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        200: { description: Success }

  /floorplans/active:
    get:
      tags: [FloorPlan]
      summary: Get active floor plans (Public)
      responses:
        200: { description: Success, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/FloorPlanResponse' } } } } }

  # Media
  /media:
    get:
      tags: [Media]
      summary: Get all media (Public)
      responses:
        200: { description: Success, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/MediaResponse' } } } } }
    post:
      tags: [Media]
      summary: Create media (Auth)
      security: [{ AdminAuth: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreateMediaRequest' } } }
      responses:
        200: { description: Success, content: { application/json: { schema: { $ref: '#/components/schemas/MediaResponse' } } } }

  /media/{id}:
    get:
      tags: [Media]
      summary: Get media by ID (Public)
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        200: { description: Success, content: { application/json: { schema: { $ref: '#/components/schemas/MediaResponse' } } } }
    put:
      tags: [Media]
      summary: Update media (Auth)
      security: [{ AdminAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/UpdateMediaRequest' } } }
      responses:
        200: { description: Success }
    delete:
      tags: [Media]
      summary: Delete media (Auth)
      security: [{ AdminAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        200: { description: Success }

  /media/active:
    get:
      tags: [Media]
      summary: Get active media (Public)
      responses:
        200: { description: Success, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/MediaResponse' } } } } }

  # Registrations
  /registrations:
    get:
      tags: [Registration]
      summary: Get all registrations (Auth)
      security: [{ AdminAuth: [] }]
      responses:
        200: { description: Success, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/RegistrationResponse' } } } } }
    post:
      tags: [Registration]
      summary: Create registration (Public)
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreateRegistrationRequest' } } }
      responses:
        200: { description: Success, content: { application/json: { schema: { $ref: '#/components/schemas/RegistrationResponse' } } } }

  /registrations/{id}:
    get:
      tags: [Registration]
      summary: Get registration by ID (Auth)
      security: [{ AdminAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        200: { description: Success, content: { application/json: { schema: { $ref: '#/components/schemas/RegistrationResponse' } } } }
    put:
      tags: [Registration]
      summary: Update registration (Auth)
      security: [{ AdminAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/UpdateRegistrationRequest' } } }
      responses:
        200: { description: Success }
    delete:
      tags: [Registration]
      summary: Delete registration (Auth)
      security: [{ AdminAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        200: { description: Success }

  # Registration Interests
  /registrationinterests:
    post:
      tags: [RegistrationInterest]
      summary: Create interest (Public)
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreateRegistrationInterestRequest' } } }
      responses:
        200: { description: Success, content: { application/json: { schema: { $ref: '#/components/schemas/RegistrationInterestResponse' } } } }

  /registrationinterests/{id}:
    delete:
      tags: [RegistrationInterest]
      summary: Delete interest (Auth)
      security: [{ AdminAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        200: { description: Success }

  /registrationinterests/registration/{registration_id}:
    get:
      tags: [RegistrationInterest]
      summary: Get interests by registration ID (Auth)
      security: [{ AdminAuth: [] }]
      parameters: [{ name: registration_id, in: path, required: true, schema: { type: string } }]
      responses:
        200: { description: Success, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/RegistrationInterestResponse' } } } } }

  # Project Info
  /projectinfo:
    get:
      tags: [ProjectInfo]
      summary: Get project info (Public)
      responses:
        200: { description: Success, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/ProjectInfoResponse' } } } } }
    post:
      tags: [ProjectInfo]
      summary: Create project info (Auth)
      security: [{ AdminAuth: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreateProjectInfoRequest' } } }
      responses:
        200: { description: Success, content: { application/json: { schema: { $ref: '#/components/schemas/ProjectInfoResponse' } } } }

  /projectinfo/{id}:
    get:
      tags: [ProjectInfo]
      summary: Get project info by ID (Public)
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        200: { description: Success, content: { application/json: { schema: { $ref: '#/components/schemas/ProjectInfoResponse' } } } }
    put:
      tags: [ProjectInfo]
      summary: Update project info (Auth)
      security: [{ AdminAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/UpdateProjectInfoRequest' } } }
      responses:
        200: { description: Success }
    delete:
      tags: [ProjectInfo]
      summary: Delete project info (Auth)
      security: [{ AdminAuth: [] }]
