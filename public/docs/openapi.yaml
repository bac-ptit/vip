openapi: 3.0.3
info:
  title: VIP Backend API
  description: |
    RESTful API for the VIP project - a high-performance real estate management system built with C++ and Drogon framework.
    
    ## Authentication
    Most endpoints require authentication via the `X-Admin-Id` header containing a valid admin session ID.
    
    ## Public Endpoints
    - Admin registration and login
    - Product catalog (GET operations)
    - Product images (GET operations)
    - Floor plans (GET operations)
    - Media gallery (GET operations)
    - Project information (GET operations)
    - Site settings (GET operations)
    - Customer registrations (POST)
  version: 1.0.0
  contact:
    name: VIP API Support
servers:
  - url: ''
    description: Current server (auto-detected)

tags:
  - name: Admin
    description: Administrator management endpoints
  - name: Admin Sessions
    description: Admin session management and security
  - name: Activity Logs
    description: Admin activity audit trail
  - name: Products
    description: Product catalog management
  - name: Product Images
    description: Product image gallery management
  - name: Floor Plans
    description: Floor plan document management
  - name: Media
    description: Media gallery (photos and videos)
  - name: Project Info
    description: Project information and details
  - name: Registrations
    description: Customer registration management
  - name: Registration Interests
    description: Customer product interest tracking
  - name: Site Settings
    description: Global site configuration

security:
  - sessionAuth: []

paths:
  # ==================== ADMIN ENDPOINTS ====================
  /api/v1/admin/register:
    post:
      tags:
        - Admin
      summary: Register a new administrator
      description: Creates a new admin account with username, password, and full name
      operationId: registerAdmin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterAdminRequest'
      responses:
        '200':
          description: Admin registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminResponse'
        '400':
          description: Invalid request or username already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/admin/login:
    post:
      tags:
        - Admin
      summary: Admin login
      description: Authenticates an admin and returns session information
      operationId: loginAdmin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  admin:
                    $ref: '#/components/schemas/AdminResponse'
                  session_id:
                    type: string
                    format: uuid
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/admin:
    get:
      tags:
        - Admin
      summary: List all administrators
      description: Retrieves a list of all admin accounts
      operationId: listAdmins
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminResponse'

  /api/v1/admin/{id}:
    get:
      tags:
        - Admin
      summary: Get admin by ID
      description: Retrieves a specific admin account by ID
      operationId: getAdminById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminResponse'
        '404':
          description: Admin not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/admin/username/{username}:
    get:
      tags:
        - Admin
      summary: Get admin by username
      description: Retrieves a specific admin account by username
      operationId: getAdminByUsername
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminResponse'
        '404':
          description: Admin not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/admin/active:
    get:
      tags:
        - Admin
      summary: List active administrators
      description: Retrieves all admin accounts with is_active=true
      operationId: listActiveAdmins
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminResponse'

  /api/v1/admin/check-username/{username}:
    get:
      tags:
        - Admin
      summary: Check username availability
      description: Checks if a username is available for registration
      operationId: checkUsername
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Username availability status
          content:
            application/json:
              schema:
                type: object
                properties:
                  available:
                    type: boolean

  /api/v1/admin/{id}/profile:
    put:
      tags:
        - Admin
      summary: Update admin profile
      description: Updates username or full name for an admin
      operationId: updateAdminProfile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminResponse'
        '404':
          description: Admin not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/admin/{id}/password:
    put:
      tags:
        - Admin
      summary: Change admin password
      description: Changes the password for an admin account
      operationId: changeAdminPassword
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: Password changed successfully
        '401':
          description: Old password incorrect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Admin not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/admin/{id}/deactivate:
    post:
      tags:
        - Admin
      summary: Deactivate admin account
      description: Sets is_active=false for an admin account
      operationId: deactivateAdmin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Admin deactivated successfully
        '404':
          description: Admin not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/admin/{id}/activate:
    post:
      tags:
        - Admin
      summary: Activate admin account
      description: Sets is_active=true for an admin account
      operationId: activateAdmin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Admin activated successfully
        '404':
          description: Admin not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ==================== ADMIN SESSIONS ENDPOINTS ====================
  /api/v1/admin-sessions/{id}:
    get:
      tags:
        - Admin Sessions
      summary: Get session by ID
      description: Retrieves details of a specific admin session
      operationId: getAdminSession
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSessionResponse'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/admin-sessions/{id}/revoke:
    post:
      tags:
        - Admin Sessions
      summary: Revoke a session
      description: Revokes a specific admin session by ID
      operationId: revokeAdminSession
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Session revoked successfully
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/admin-sessions/admin/{admin_id}:
    get:
      tags:
        - Admin Sessions
      summary: List sessions for an admin
      description: Retrieves all sessions for a specific admin
      operationId: listAdminSessions
      parameters:
        - name: admin_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminSessionResponse'

  /api/v1/admin-sessions/admin/{admin_id}/revoke-all:
    post:
      tags:
        - Admin Sessions
      summary: Revoke all sessions for an admin
      description: Revokes all active sessions for a specific admin
      operationId: revokeAllAdminSessions
      parameters:
        - name: admin_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: All sessions revoked successfully

  # ==================== ACTIVITY LOGS ENDPOINTS ====================
  /api/v1/activity-logs:
    get:
      tags:
        - Activity Logs
      summary: List all activity logs
      description: Retrieves all activity logs across all admins
      operationId: listActivityLogs
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ActivityLogResponse'

  /api/v1/activity-logs/admin/{admin_id}:
    get:
      tags:
        - Activity Logs
      summary: List activity logs for an admin
      description: Retrieves all activity logs for a specific admin
      operationId: listAdminActivityLogs
      parameters:
        - name: admin_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ActivityLogResponse'

  # ==================== PRODUCTS ENDPOINTS ====================
  /api/v1/products:
    post:
      tags:
        - Products
      summary: Create a new product
      description: Creates a new product in the catalog
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '200':
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      tags:
        - Products
      summary: List all products
      description: Retrieves all products in the catalog
      operationId: listProducts
      security: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductResponse'

  /api/v1/products/{id}:
    get:
      tags:
        - Products
      summary: Get product by ID
      description: Retrieves a specific product by ID
      operationId: getProduct
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags:
        - Products
      summary: Update a product
      description: Updates an existing product
      operationId: updateProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Product updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags:
        - Products
      summary: Delete a product
      description: Deletes a product from the catalog
      operationId: deleteProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Product deleted successfully
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/products/search:
    get:
      tags:
        - Products
      summary: Search products
      description: Search products by name, type, and price range
      operationId: searchProducts
      security: []
      parameters:
        - name: name
          in: query
          description: Filter by product name (partial match)
          schema:
            type: string
        - name: type
          in: query
          description: Filter by product type
          schema:
            type: string
        - name: min_price
          in: query
          description: Minimum price filter
          schema:
            type: string
        - name: max_price
          in: query
          description: Maximum price filter
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductResponse'

  # ==================== PRODUCT IMAGES ENDPOINTS ====================
  /api/v1/product-images:
    post:
      tags:
        - Product Images
      summary: Create a product image
      description: Uploads a new product image
      operationId: createProductImage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductImageRequest'
      responses:
        '200':
          description: Product image created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductImageResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/product-images/{id}:
    get:
      tags:
        - Product Images
      summary: Get product image by ID
      description: Retrieves a specific product image
      operationId: getProductImage
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductImageResponse'
        '404':
          description: Product image not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags:
        - Product Images
      summary: Update a product image
      description: Updates product image metadata
      operationId: updateProductImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductImageRequest'
      responses:
        '200':
          description: Product image updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductImageResponse'
        '404':
          description: Product image not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags:
        - Product Images
      summary: Delete a product image
      description: Deletes a product image
      operationId: deleteProductImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Product image deleted successfully
        '404':
          description: Product image not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/product-images/product/{product_id}:
    get:
      tags:
        - Product Images
      summary: List all images for a product
      description: Retrieves all images (active and inactive) for a specific product
      operationId: listProductImages
      security: []
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductImageResponse'

  /api/v1/product-images/product/{product_id}/active:
    get:
      tags:
        - Product Images
      summary: List active images for a product
      description: Retrieves only active images for a specific product
      operationId: listActiveProductImages
      security: []
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductImageResponse'

  # ==================== FLOOR PLANS ENDPOINTS ====================
  /api/v1/floor-plans:
    post:
      tags:
        - Floor Plans
      summary: Create a floor plan
      description: Uploads a new floor plan document
      operationId: createFloorPlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFloorPlanRequest'
      responses:
        '200':
          description: Floor plan created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FloorPlanResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      tags:
        - Floor Plans
      summary: List all floor plans
      description: Retrieves all floor plans
      operationId: listFloorPlans
      security: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FloorPlanResponse'

  /api/v1/floor-plans/active:
    get:
      tags:
        - Floor Plans
      summary: List active floor plans
      description: Retrieves only active floor plans
      operationId: listActiveFloorPlans
      security: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FloorPlanResponse'

  /api/v1/floor-plans/{id}:
    get:
      tags:
        - Floor Plans
      summary: Get floor plan by ID
      description: Retrieves a specific floor plan
      operationId: getFloorPlan
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FloorPlanResponse'
        '404':
          description: Floor plan not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags:
        - Floor Plans
      summary: Update a floor plan
      description: Updates floor plan metadata
      operationId: updateFloorPlan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFloorPlanRequest'
      responses:
        '200':
          description: Floor plan updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FloorPlanResponse'
        '404':
          description: Floor plan not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags:
        - Floor Plans
      summary: Delete a floor plan
      description: Deletes a floor plan
      operationId: deleteFloorPlan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Floor plan deleted successfully
        '404':
          description: Floor plan not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ==================== MEDIA ENDPOINTS ====================
  /api/v1/media:
    post:
      tags:
        - Media
      summary: Create a media item
      description: Uploads a new media item (photo or video)
      operationId: createMedia
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMediaRequest'
      responses:
        '200':
          description: Media created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      tags:
        - Media
      summary: List all media
      description: Retrieves all media items
      operationId: listMedia
      security: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MediaResponse'

  /api/v1/media/active:
    get:
      tags:
        - Media
      summary: List active media
      description: Retrieves only active media items
      operationId: listActiveMedia
      security: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MediaResponse'

  /api/v1/media/{id}:
    get:
      tags:
        - Media
      summary: Get media by ID
      description: Retrieves a specific media item
      operationId: getMedia
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaResponse'
        '404':
          description: Media not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags:
        - Media
      summary: Update a media item
      description: Updates media metadata
      operationId: updateMedia
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMediaRequest'
      responses:
        '200':
          description: Media updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaResponse'
        '404':
          description: Media not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags:
        - Media
      summary: Delete a media item
      description: Deletes a media item
      operationId: deleteMedia
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Media deleted successfully
        '404':
          description: Media not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ==================== PROJECT INFO ENDPOINTS ====================
  /api/v1/project-info:
    post:
      tags:
        - Project Info
      summary: Create project information
      description: Creates a new project info record
      operationId: createProjectInfo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectInfoRequest'
      responses:
        '200':
          description: Project info created successfully
