openapi: 3.0.3
info:
  title: VIP Backend API
  description: High-performance backend for VIP project using Drogon and Glaze. Hỗ trợ Aggregate Update (Product + Images).
  version: 1.0.0
servers:
  - url: /api/v1
    description: Primary API version

components:
  securitySchemes:
    AdminAuth:
      type: apiKey
      in: header
      name: X-Admin-Id
      description: Custom header for admin authentication.
    CookieAuth:
      type: apiKey
      in: cookie
      name: JSESSIONID

  schemas:
    # Common
    ErrorResponse:
      type: object
      properties:
        error:
          type: string

    # Auth
    RegisterAdminRequest:
      type: object
      required: [username, password, full_name]
      properties:
        username: { type: string }
        password: { type: string }
        full_name: { type: string }
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }
    AdminResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        full_name: { type: string }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # Products (Multipart)
    ProductResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        type: { type: string }
        name: { type: string }
        price: { type: string }
        area: { type: string }
        description: { type: string }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        images: { type: array, items: { $ref: '#/components/schemas/ProductImageResponse' } }

    ProductImageResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        product_id: { type: string, format: uuid }
        url: { type: string }
        is_cover: { type: boolean }
        sort_order: { type: integer }
        uploaded_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }

    # Floor Plans
    CreateFloorPlanRequest:
      type: object
      required: [title, url]
      properties:
        title: { type: string }
        url: { type: string }
        sort_order: { type: integer }
        is_active: { type: boolean }
    UpdateFloorPlanRequest:
      type: object
      properties:
        title: { type: string }
        url: { type: string }
        sort_order: { type: integer }
        is_active: { type: boolean }
    FloorPlanResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        url: { type: string }
        sort_order: { type: integer }
        is_active: { type: boolean }
        uploaded_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }

    # Media
    CreateMediaRequest:
      type: object
      required: [type, url]
      properties:
        type: { type: string }
        title: { type: string }
        url: { type: string }
        thumbnail: { type: string }
        sort_order: { type: integer }
        is_active: { type: boolean }
    UpdateMediaRequest:
      type: object
      properties:
        type: { type: string }
        title: { type: string }
        url: { type: string }
        thumbnail: { type: string }
        sort_order: { type: integer }
        is_active: { type: boolean }
    MediaResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        type: { type: string }
        title: { type: string }
        url: { type: string }
        thumbnail: { type: string }
        sort_order: { type: integer }
        is_active: { type: boolean }
        uploaded_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }

    # ... rest of schemas (Registration, ProjectInfo, etc. - unchanged)

paths:
  # Auth
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new admin (Public)
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/RegisterAdminRequest' } } }
      responses:
        200: { description: Success, content: { application/json: { schema: { $ref: '#/components/schemas/AdminResponse' } } } }

  /auth/login:
    post:
      tags: [Auth]
      summary: Login as admin (Public)
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/LoginRequest' } } }
      responses:
        200: { description: Success, content: { application/json: { schema: { $ref: '#/components/schemas/AdminResponse' } } } }
        401: { description: Unauthorized }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout current session (Auth)
      security: [{ AdminAuth: [] }, { CookieAuth: [] }]
      responses:
        200: { description: Success }

  # Products
  /products:
    get:
      tags: [Product]
      summary: Get all products (Public)
      responses:
        200: { description: Success, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/ProductResponse' } } } } }
    post:
      tags: [Product]
      summary: Create new product with multiple images (Auth + ImgBB)
      security: [{ AdminAuth: [] }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                type: { type: string }
                name: { type: string }
                price: { type: string }
                area: { type: string }
                description: { type: string }
                is_active: { type: string, enum: ["true", "false"] }
                files: { type: array, items: { type: string, format: binary } }
      responses:
        200: { description: Success, content: { application/json: { schema: { $ref: '#/components/schemas/ProductResponse' } } } }

  /products/{id}:
    get:
      tags: [Product]
      summary: Get product by ID (Public)
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        200: { description: Success, content: { application/json: { schema: { $ref: '#/components/schemas/ProductResponse' } } } }
    put:
      tags: [Product]
      summary: Update product, add/delete images (Auth + ImgBB)
      security: [{ AdminAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                type: { type: string }
                name: { type: string }
                price: { type: string }
                area: { type: string }
                description: { type: string }
                is_active: { type: string, enum: ["true", "false"] }
                image_ids_to_delete: { type: string, description: "Comma separated IDs" }
                files: { type: array, items: { type: string, format: binary } }
      responses:
        200: { description: Success }
    delete:
      tags: [Product]
      summary: Delete product and all its images (Auth)
      security: [{ AdminAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        200: { description: Success }

  /products/search:
    get:
      tags: [Product]
      summary: Search products (Public)
      parameters:
        - { name: name, in: query, schema: { type: string } }
        - { name: type, in: query, schema: { type: string } }
        - { name: min_price, in: query, schema: { type: string } }
        - { name: max_price, in: query, schema: { type: string } }
      responses:
        200: { description: Success, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/ProductResponse' } } } } }
